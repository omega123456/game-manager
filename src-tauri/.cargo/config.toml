# Cargo aliases for the Rust test + coverage gates.
#
# After adding a new integration test file under `src-tauri/tests/`, register it
# in BOTH aliases below (`--test <suite_name>` for nextest, and add it to the
# llvm-cov run) so the suite is exercised by `pnpm test:rust` and the coverage gate.
[alias]
# Fast iteration: run all integration tests via nextest (no coverage instrumentation).
gm-test-integration = "nextest run --test smoke_integration --test db_schema_integration --test db_repositories_integration --test db_connection_integration --test db_error_paths_integration --test logging_retention_integration --test settings_commands_integration --test games_commands_integration --test art_commands_integration"

# Coverage gate. Lines + functions are held at the project-mandated 90% (these
# mirror the TypeScript Vitest gate of 90% lines/functions/statements). The
# `regions` metric is held at 80%: llvm-cov emits an uncoverable error
# sub-region for every `?`/`row.get(...)?` in idiomatic `rusqlite` repository
# code, which structurally caps region coverage well below 90% even at ~95%
# line coverage. Phase A2 lands the first DB-heavy code and surfaced this; the
# binding gate remains lines/functions at 90. See the A2 handoff for rationale.
gm-llvm-cov = "llvm-cov --lib --tests --ignore-filename-regex (main\\.rs|/tests/) --fail-under-lines 90 --fail-under-functions 90 --fail-under-regions 80 --summary-only"
