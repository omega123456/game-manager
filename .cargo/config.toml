# Rust integration tests and llvm-cov settings (invoked via pnpm test:rust / test:rust:coverage).
# Run from the repository root.
# Requires cargo-nextest: https://nexte.st/book/installing.html (e.g. cargo install cargo-nextest).

[alias]
# Integration test targets for this crate (src-tauri/tests/*.rs). Edit here when adding a suite.
gm-test-integration = [
  "nextest",
